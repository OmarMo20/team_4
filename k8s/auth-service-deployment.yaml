apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      component: auth-service
  template:
    metadata:
      labels:
        component: auth-service
    spec:
      containers:
        - name: auth-service
          image: omarmo20/class-track-auth-service:latest
          ports:
            - containerPort: 5001
          env:
            - name: MONGODB_URI
              value: "mongodb://mongodb-cluster-ip-service:27017/class_track_db"
            - name: JWT_SECRET
              value: "123456"
            - name: PORT
              value: "5001" 
            - name: EMAIL_HOST
              value: "smtp.gmail.com"
            - name: EMAIL_PORT
              value: "587"
            - name: EMAIL_USER
              value: "classtrack123@gmail.com"
            - name: EMAIL_FROM
              value: "ClassTrack <classtrack123@gmail.com>"
            - name: CORS_ORIGINS
              value: "http://localhost:3000,http://localhost:5173,http://localhost:80,http://192.168.49.2,http://192.168.49.2:80,http://63.179.41.132:30080"
            - name: RATE_LIMIT_WINDOW_MS
              value: "900000"
            - name: RATE_LIMIT_MAX_REQUESTS
              value: "100"
            - name: JWT_EXPIRES_IN
              value: "7d"
            - name: BCRYPT_SALT_ROUNDS
              value: "12"
          envFrom:
            - secretRef:
                name: backend-secret
