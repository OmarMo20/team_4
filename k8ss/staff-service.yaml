apiVersion: apps/v1
kind: Deployment
metadata:
  name: staff-service-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      component: staff-service
  template:
    metadata:
      labels:
        component: staff-service
    spec:
      containers:
        - name: staff-service
          image: mohammededris/class-track-staff-service
          ports:
            - containerPort: 5002
          envFrom:
            - secretRef:
                name: backend-secrets
          env:
            - name: NODE_ENV
              value: "development"
            - name: PORT
              value: "5002"
            - name: HOST
              value: "localhost"
            - name: JWT_EXPIRES_IN
              value: "7d"
            - name: BCRYPT_SALT_ROUNDS
              value: "12"
            - name: CORS_ORIGINS
              value: "http://localhost:3000,http://localhost:5173"
            - name: RATE_LIMIT_WINDOW_MS
              value: "900000"
            - name: RATE_LIMIT_MAX_REQUESTS
              value: "100"
            - name: EMAIL_HOST
              value: "smtp.gmail.com"
            - name: EMAIL_PORT
              value: "587"
            - name: EMAIL_USER
              value: "classtrack123@gmail.com"
            - name: EMAIL_FROM
              value: "ClassTrack <classtrack123@gmail.com>"
---
apiVersion: v1
kind: Service
metadata:
  name: staff-service-ip-service
spec:
  type: ClusterIP
  selector:
    component: staff-service
  ports:
    - port: 5002
      targetPort: 5002
